name: Publish to NPM

on:
  push:
    branches:
      - main
    paths:
      - 'packages/page-sense-library/**'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Build library
        working-directory: packages/page-sense-library
        run: pnpm run build

      - name: Publish to NPM
        working-directory: packages/page-sense-library
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Only publish if the version in package.json has changed and isn't already on NPM.
          # Alternatively, for a simple workflow, we just run npm publish.
          # We'll use a simple approach, but it will fail if the version isn't bumped in PRs.
          npm publish --access public
